<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jafur Golf Game</title>
    <style>
        body { font-family: -apple-system, sans-serif; background:#0a0a0a; color:#fff; padding:20px; display: flex; flex-direction: column; align-items: center; }
        .scoreboard { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 10px; width: 100%; max-width: 500px; display: flex; justify-content: space-around; }
        .feedback { color: #00bfff; font-weight: bold; height: 20px; margin-bottom: 10px; }
        .controls { width: 100%; max-width: 500px; background: #1a1a1a; padding: 20px; border-radius: 10px; }
        .slider-group { margin-bottom: 15px; }
        .slider { width:100%; cursor: pointer; }
        button { padding:10px 20px; background:#00bfff; border:none; border-radius:5px; color:white; font-weight: bold; cursor: pointer; }
        button:hover { background: #0099cc; }
        #course { background:#111; margin-top: 20px; border: 2px solid #333; border-radius: 10px; width: 100%; max-width: 600px; }
        span { color: #00bfff; font-weight: bold; }
    </style>
</head>
<body>

    <h2>⛳ Jafur Golf Game</h2>

    <div class="scoreboard">
        <div>Hole: <span id="holeNum">1</span></div>
        <div>Par Dist: <span id="holeDist">410</span></div>
        <div>To Pin: <span id="remain">410</span> yd</div>
    </div>
    <div class="scoreboard">
        <div>Strokes: <span id="strokesHole">0</span></div>
        <div>Total Score: <span id="totalScore">0</span></div>
    </div>

    <div class="feedback" id="feedback">Ready for Tee Off!</div>

    <div class="controls">
        <label>Club: </label>
        <select id="club">
            <option value="driver">Driver (Power)</option>
            <option value="iron">Iron (Balanced)</option>
            <option value="wedge">Wedge (High Spin)</option>
        </select>
        <br><br>

        <div class="slider-group">
            Speed: <span id="clubSpeedVal">100</span> mph
            <input type="range" id="clubSpeed" class="slider" min="60" max="130" value="100">
        </div>
        <div class="slider-group">
            Launch: <span id="launchVal">12</span>°
            <input type="range" id="launchAngle" class="slider" min="8" max="45" value="12">
        </div>
        <div class="slider-group">
            Spin: <span id="spinVal">2500</span> rpm
            <input type="range" id="spinRate" class="slider" min="2000" max="8000" value="2500">
        </div>
        <div class="slider-group">
            Wind: <span id="windVal">0</span> mph
            <input type="range" id="windSpeed" class="slider" min="-30" max="30" value="0">
        </div>

        <button onclick="launchShot()">Launch Ball</button>
        <button onclick="resetGame()" style="background: #444;">Reset Game</button>
    </div>

    <svg id="course" viewBox="0 0 400 160">
        <line x1="0" y1="140" x2="400" y2="140" stroke="#333" stroke-width="2"/>
        <rect id="green" x="350" y="138" width="40" height="4" fill="#2ecc71"/>
        <line x1="375" y1="138" x2="375" y2="110" stroke="white" stroke-width="1"/>
        <rect x="375" y="110" width="10" height="7" fill="red"/>
        
        <path id="path" stroke="#00bfff" fill="none" stroke-width="1" opacity="0.3" stroke-dasharray="4"/>
        <circle id="ball" cx="20" cy="140" r="4" fill="white"/>
    </svg>

<script>
const PIXELS_PER_YARD = 0.8; 
const START_X = 20;
const GROUND_Y = 140;

const game = {
    hole: 1,
    distances: [410, 530, 165, 390, 420, 210, 560, 440, 180],
    remaining: 0,
    strokesHole: 0,
    total: 0,
    ballX: START_X // Visual position
};

function startHole() {
    game.remaining = game.distances[game.hole - 1];
    game.strokesHole = 0;
    game.ballX = START_X;
    updateUI(`Hole ${game.hole}: ${game.remaining} yards to go.`);
    moveBallVisual(START_X, GROUND_Y);
}

function updateUI(msg) {
    document.getElementById("holeNum").textContent = game.hole;
    document.getElementById("holeDist").textContent = game.distances[game.hole - 1];
    document.getElementById("remain").textContent = Math.abs(game.remaining).toFixed(0);
    document.getElementById("strokesHole").textContent = game.strokesHole;
    document.getElementById("totalScore").textContent = game.total;
    if (msg) document.getElementById("feedback").textContent = msg;
}

function moveBallVisual(x, y) {
    const ball = document.getElementById("ball");
    ball.setAttribute("cx", x);
    ball.setAttribute("cy", y);
}

function applyClub(speed, spin) {
    const club = document.getElementById("club").value;
    if (club === "driver") return { speed: speed * 1.1, spin: spin * 0.8, roll: 1.5 };
    if (club === "iron") return { speed: speed * 0.9, spin: spin * 1.0, roll: 0.8 };
    return { speed: speed * 0.6, spin: spin * 1.5, roll: 0.2 };
}

function simulate(speed, launch, spin, wind) {
    const windMs = wind * 0.447;
    const g = 9.81;
    let vx = (speed * 0.447) * Math.cos(launch * Math.PI / 180);
    let vy = (speed * 0.447) * Math.sin(launch * Math.PI / 180);
    let x = 0, y = 0;
    const pts = [];

    // Simple Euler integration for flight
    for (let i = 0; i < 1000; i++) {
        pts.push({ x, y });
        vx -= 0.005 * (vx - windMs); // Drag + Wind
        vy -= 0.005 * vy + g * 0.01;  // Drag + Gravity
        x += vx * 0.1;
        y += vy * 0.1;
        if (y < 0) break;
    }
    return { carry: x, pts };
}

function launchShot() {
    let baseSpeed = +document.getElementById("clubSpeed").value;
    let baseSpin = +document.getElementById("spinRate").value;
    const stats = applyClub(baseSpeed, baseSpin);
    
    const sim = simulate(stats.speed, +document.getElementById("launchAngle").value, stats.spin, +document.getElementById("windSpeed").value);
    
    const totalDist = sim.carry + (sim.carry * 0.2 * stats.roll);
    game.strokesHole++;
    game.total++;

    animateShot(sim.pts, totalDist);

    setTimeout(() => {
        game.remaining -= totalDist;
        
        if (Math.abs(game.remaining) < 5) {
            updateUI("In the hole! Great shot.");
            setTimeout(nextHole, 1500);
        } else {
            const direction = game.remaining > 0 ? "short" : "long";
            updateUI(`You are ${Math.abs(game.remaining).toFixed(0)} yd ${direction} of the pin.`);
            // Reset ball to start visual if still far, or keep moving it? 
            // For simplicity, we reset visual but update "remaining"
            game.ballX = START_X; 
            moveBallVisual(START_X, GROUND_Y);
        }
    }, 1800);
}

function animateShot(pts, totalDist) {
    const path = document.getElementById("path");
    const ball = document.getElementById("ball");
    
    // Scale points to SVG space
    const scaled = pts.map(p => ({
        x: START_X + (p.x * PIXELS_PER_YARD),
        y: GROUND_Y - (p.y * PIXELS_PER_YARD)
    }));

    // Draw trajectory
    const d = scaled.map((p, i) => `${i === 0 ? "M" : "L"}${p.x},${p.y}`).join(" ");
    path.setAttribute("d", d);
    path.setAttribute("opacity", "0.5");

    const duration = 1500;
    const start = performance.now();

    function frame(now) {
        let t = (now - start) / duration;
        if (t > 1) t = 1;

        const idx = Math.floor(t * (scaled.length - 1));
        const p = scaled[idx];
        
        // When flight ends, slide to total distance (roll)
        if (t < 0.8) {
            moveBallVisual(p.x, p.y);
        } else {
            const rollT = (t - 0.8) / 0.2;
            const finalX = START_X + (totalDist * PIXELS_PER_YARD);
            const rollX = scaled[scaled.length-1].x + (finalX - scaled[scaled.length-1].x) * rollT;
            moveBallVisual(rollX, GROUND_Y);
        }

        if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
}

function nextHole() {
    if (game.hole >= game.distances.length) {
        alert("🏁 Round Complete! Total Strokes: " + game.total);
        resetGame();
    } else {
        game.hole++;
        startHole();
    }
}

function resetGame() {
    game.hole = 1;
    game.total = 0;
    startHole();
}

// Slider listeners
document.getElementById("clubSpeed").oninput = (e) => document.getElementById("clubSpeedVal").textContent = e.target.value;
document.getElementById("launchAngle").oninput = (e) => document.getElementById("launchVal").textContent = e.target.value;
document.getElementById("spinRate").oninput = (e) => document.getElementById("spinVal").textContent = e.target.value;
document.getElementById("windSpeed").oninput = (e) => document.getElementById("windVal").textContent = e.target.value;

startHole();
</script>
</body>
</html>
