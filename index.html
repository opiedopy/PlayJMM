<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="apple-touch-icon" href="JMM-Lab.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMMLab15</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap');

  :root {
    --forest: #1b4332;
    --grass: #2d6a4f;
    --parchment: #fdf5e6;
    --brass: #d4af37;
    --wood: #3d2b1f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('bcc.png');
    background-color: var(--forest);
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-position: center center;
    color: var(--parchment);
    min-height: 100vh;
    padding: 16px;
    max-width: 520px;
    margin: 0 auto;
  }

  h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--brass); text-align: center; margin-bottom: 2px; }
  .subtitle { text-align: center; font-size: 0.7rem; color: var(--brass); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 16px; }

  /* HUD updated to 4 columns to fit Launch Angle */
  .lab-hud {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 14px;
    position: relative; z-index: 10;
  }
  .hud-stat { background: rgba(0, 0, 0, 0.6); border: 1px solid var(--brass); border-radius: 4px; padding: 10px 2px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
  .hud-label { font-size: 0.5rem; color: var(--brass); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .hud-val { font-size: 1.1rem; font-weight: 600; color: #fff; }
  .hud-unit { font-size: 0.55rem; color: #aaa; margin-left: 1px; font-weight: 400;}

  #course { width: 100%; border-radius: 8px; border: 2px solid var(--brass); margin-bottom: 14px; background: #0a1f16; position: relative; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }

  .controls {
    background: var(--wood);
    background-image: linear-gradient(to bottom, #4d3626, #2b1e15);
    border: 1px solid var(--brass);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 14px;
    position: relative; z-index: 10;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }

  .club-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
  .club-btn { padding: 6px 2px; background: #1b1b1b; border: 1px solid var(--brass); border-radius: 4px; color: var(--brass); font-size: 0.55rem; font-weight: 600; cursor: pointer; flex: 1 0 15%; min-width: 50px; text-align: center; transition: all 0.2s; }
  .club-btn.active { background: var(--brass); color: var(--wood); box-shadow: 0 0 8px var(--brass); }

  .slider-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 12px;
  }

  .slider-box {
    background: rgba(0, 0, 0, 0.25);
    padding: 6px 8px;
    border-radius: 4px;
    border: 1px solid rgba(212, 175, 55, 0.15);
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.55rem;
    font-weight: 600;
    color: var(--parchment);
    text-transform: uppercase;
    margin-bottom: 4px;
    align-items: center;
  }
  .slider-val { color: var(--brass); font-weight: bold; }

  input[type=range] { 
    width: 100%; 
    -webkit-appearance: none; 
    height: 12px; 
    background: rgba(255,255,255,0.1); 
    border-radius: 6px; 
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb { 
    -webkit-appearance: none; 
    width: 30px;  
    height: 30px; 
    background: var(--brass); 
    border-radius: 50%; 
    border: 2px solid var(--wood); 
    cursor: pointer; 
    margin-top: -9px; 
    box-shadow: 0 0 8px rgba(0,0,0,0.5);
  }

  .btn-row { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; cursor: pointer; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; transition: transform 0.1s; }
  .btn-compare { background: var(--grass); color: white; border: 1px solid #4ade80; }
  .btn-reset { background: #4a1e1e; color: white; border: 1px solid #f87171; }
  .btn-details { background: var(--brass); color: var(--wood); border: 1px solid var(--parchment); }
</style>
</head>
<body>

<div style="position: relative; z-index: 10;">
  <h2>⛳ JMM Club Lab 15</h2>
  <div class="subtitle">Live Aero Physics • Asheville NC (2,165')</div>

  <div class="lab-hud">
    <div class="hud-stat"><div class="hud-label">Carry</div><div class="hud-val"><span id="valCarry">0</span><span class="hud-unit">yd</span></div></div>
    <div class="hud-stat"><div class="hud-label">Total</div><div class="hud-val"><span id="valTotal">0</span><span class="hud-unit">yd</span></div></div>
    <div class="hud-stat"><div class="hud-label">Launch</div><div class="hud-val"><span id="valLaunch">0</span><span class="hud-unit">°</span></div></div>
    <div class="hud-stat"><div class="hud-label">Apex</div><div class="hud-val"><span id="valApex">0</span><span class="hud-unit">yd</span></div></div>
  </div>

  <svg id="course" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="200" fill="#0a1f16" opacity="0.8"/>
    <line x1="106" y1="185" x2="106" y2="190" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <text x="106" y="198" fill="#fff" font-size="8" text-anchor="middle" opacity="0.4">100</text>
    <line x1="201" y1="185" x2="201" y2="190" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <text x="201" y="198" fill="#fff" font-size="8" text-anchor="middle" opacity="0.4">200</text>
    <line x1="296" y1="185" x2="296" y2="190" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <text x="296" y="198" fill="#fff" font-size="8" text-anchor="middle" opacity="0.4">300</text>
    
    <rect x="0" y="185" width="400" height="15" fill="#1b4332"/>
    <ellipse cx="360" cy="185" rx="30" ry="8" fill="#2d6a4f" stroke="var(--brass)" stroke-width="0.5" opacity="0.3"/>
    
    <g id="ghostLayer"></g>
    <path id="livePath" stroke="var(--brass)" fill="none" stroke-width="2.5" stroke-dasharray="1,1" />
    <circle id="ball" cx="11" cy="185" r="4" fill="white"/>
  </svg>

  <div class="controls">
    <div class="club-row" id="clubButtons"></div>
    
    <div class="slider-grid">
      <div class="slider-box">
        <div class="slider-label">Club Spd <span class="slider-val" id="clubSpeedVal">100</span></div>
        <input type="range" id="clubSpeed" min="40" max="140" value="100">
      </div>
      <div class="slider-box">
        <div class="slider-label">Smash <span class="slider-val" id="smashFactorVal">1.48</span></div>
        <input type="range" id="smashFactor" min="1.0" max="1.52" step="0.01" value="1.48">
      </div>
      <div class="slider-box">
        <div class="slider-label">Dyn Loft <span class="slider-val" id="dynLoftVal">11°</span></div>
        <input type="range" id="dynLoft" min="5" max="60" value="11">
      </div>
      <div class="slider-box">
        <div class="slider-label">Attack Ang <span class="slider-val" id="attAngleVal">0°</span></div>
        <input type="range" id="attAngle" min="-10" max="10" step="0.5" value="0">
      </div>
      <div class="slider-box">
        <div class="slider-label">
          <span>Backspin <span style="color:#aaa; font-size:0.5rem;">(SL: <span id="spinLoftVal">0</span>°)</span></span>
          <span class="slider-val" id="spinRateVal">2500</span>
        </div>
        <input type="range" id="spinRate" min="500" max="12000" step="100" value="2500">
      </div>
      <div class="slider-box">
        <div class="slider-label">Wind <span id="windDir">—</span> <span class="slider-val" id="windSpeedVal">0</span></div>
        <input type="range" id="windSpeed" min="-40" max="40" value="0">
      </div>
      <div class="slider-box">
        <div class="slider-label">Drag (Cd) <span class="slider-val" id="dragCoeffVal">0.24</span></div>
        <input type="range" id="dragCoeff" min="0.10" max="0.40" step="0.01" value="0.24">
      </div>
      <div class="slider-box">
        <div class="slider-label">Lift (Cl) <span class="slider-val" id="liftMultVal">0.15</span></div>
        <input type="range" id="liftMult" min="0.00" max="0.40" step="0.01" value="0.15">
      </div>
      <div class="slider-box">
        <div class="slider-label">Turf Firm <span class="slider-val" id="turfFirmnessVal">0.40</span></div>
        <input type="range" id="turfFirmness" min="0.10" max="0.90" step="0.05" value="0.40">
      </div>
      <div class="slider-box">
        <div class="slider-label">Turf Frict <span class="slider-val" id="turfFrictionVal">0.55</span></div>
        <input type="range" id="turfFriction" min="0.10" max="0.99" step="0.01" value="0.55">
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-compare" onclick="freezeArc()">Freeze Arc</button>
    <button class="btn btn-reset" onclick="resetLab()">Clear</button>
    <button class="btn btn-details" onclick="window.location.href='details.html'">Details</button>
  </div>
</div>

<script>
const clubs = [
  {name: "DRIVER", id: "dr", speed: 100, smash: 1.48, loft: 11, spin: 2500},
  {name: "3-WOOD", id: "3w", speed: 95,  smash: 1.45, loft: 13, spin: 3000},
  {name: "1-IRON", id: "1i", speed: 90,  smash: 1.42, loft: 10, spin: 3200},
  {name: "4-HYB",  id: "4h", speed: 85,  smash: 1.38, loft: 14, spin: 4000},
  {name: "5-IRON", id: "5i", speed: 82,  smash: 1.35, loft: 15, spin: 4500},
  {name: "7-IRON", id: "7i", speed: 76,  smash: 1.29, loft: 20, spin: 6000},
  {name: "9-IRON", id: "9i", speed: 70,  smash: 1.23, loft: 28, spin: 8000},
  {name: "PW",     id: "pw", speed: 65,  smash: 1.18, loft: 34, spin: 9000},
  {name: "SW",     id: "sw", speed: 60,  smash: 1.12, loft: 40, spin: 10000}
];

let selectedClub = clubs[0];
let currentPathData = "";

const BALL_MASS_KG = 0.04593;

const sliderIds = ['clubSpeed', 'smashFactor', 'dynLoft', 'attAngle', 'spinRate', 'windSpeed', 'dragCoeff', 'liftMult', 'turfFirmness', 'turfFriction'];
sliderIds.forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    let val = e.target.value;
    if (id === 'dynLoft' || id === 'attAngle') {
      document.getElementById(id + 'Val').textContent = val + "°";
    } else {
      document.getElementById(id + 'Val').textContent = val;
    }
    
    if (id === 'windSpeed') {
      document.getElementById('windDir').textContent = val > 0 ? '→' : val < 0 ? '←' : '—';
    }
    updatePhysics();
  });
});

function applyClubPreset(c) {
  selectedClub = c;
  document.getElementById('clubSpeed').value = c.speed;
  document.getElementById('clubSpeedVal').textContent = c.speed;
  document.getElementById('smashFactor').value = c.smash;
  document.getElementById('smashFactorVal').textContent = c.smash.toFixed(2);
  document.getElementById('dynLoft').value = c.loft;
  document.getElementById('dynLoftVal').textContent = c.loft + "°";
  document.getElementById('attAngle').value = 0;
  document.getElementById('attAngleVal').textContent = "0°";
  document.getElementById('spinRate').value = c.spin;
  document.getElementById('spinRateVal').textContent = c.spin;
  updatePhysics();
}

function createClubButtons() {
  const container = document.getElementById('clubButtons');
  clubs.forEach(c => {
    const b = document.createElement('button');
    b.className = 'club-btn' + (c.id === selectedClub.id ? ' active' : '');
    b.textContent = `${c.name}/${c.loft}`;
    b.onclick = () => {
      document.querySelectorAll('.club-btn').forEach(btn => btn.classList.remove('active'));
      b.classList.add('active'); 
      applyClubPreset(c);
    };
    container.appendChild(b);
  });
}

function updatePhysics() {
  const speedMph = parseFloat(document.getElementById('clubSpeed').value);
  const smash = parseFloat(document.getElementById('smashFactor').value);
  const dynLoft = parseFloat(document.getElementById('dynLoft').value);
  const attAngle = parseFloat(document.getElementById('attAngle').value);
  
  // Real-time Spin Loft calculation
  const spinLoft = dynLoft - attAngle;
  document.getElementById('spinLoftVal').textContent = spinLoft.toFixed(1);

  // Calculate Resultant Launch Angle
  const launchDeg = attAngle + (dynLoft - attAngle) * 0.8;
  document.getElementById('valLaunch').textContent = launchDeg.toFixed(1);

  const backspin = parseFloat(document.getElementById('spinRate').value);
  const windMph = parseFloat(document.getElementById('windSpeed').value);
  const Cd = parseFloat(document.getElementById('dragCoeff').value);
  const Cl_base = parseFloat(document.getElementById('liftMult').value);
  const firmness = parseFloat(document.getElementById('turfFirmness').value);
  const friction = parseFloat(document.getElementById('turfFriction').value);

  const rho = 1.15;  
  const g = 9.796;   
  const area = 0.001432; 

  const v0 = speedMph * 0.44704 * smash; 
  const rad = launchDeg * Math.PI / 180;
  let vx = v0 * Math.cos(rad);
  let vy = v0 * Math.sin(rad);
  const v_wind = windMph * 0.44704; 

  let x = 0, y = 0, apex = 0;
  const dt = 0.015; 
  const pts = [];
  let carry = 0;
  let hasLanded = false;

  for (let i = 0; i < 2000; i++) {
    if (i % 2 === 0) pts.push({ x: x, y: y });
    if (y > apex) apex = y;
    let Vair_x = vx - v_wind;
    let Vair_y = vy;
    let Vair = Math.sqrt(Vair_x * Vair_x + Vair_y * Vair_y);
    
    if (y > 0 || !hasLanded) {
      if (Vair > 0) {
        let Fd = 0.5 * rho * Vair * Vair * Cd * area;
        let ad = Fd / BALL_MASS_KG;
        let ad_x = -ad * (Vair_x / Vair);
        let ad_y = -ad * (Vair_y / Vair);
        
        let Cl = Cl_base * (backspin / 3000);
        let Fl = 0.5 * rho * Vair * Vair * Cl * area;
        let al = Fl / BALL_MASS_KG;
        let al_x = -al * (Vair_y / Vair); 
        let al_y = al * (Vair_x / Vair);
        
        vx += (ad_x + al_x) * dt;
        vy += (-g + ad_y + al_y) * dt;
      } else {
        vy -= g * dt;
      }
    }
    
    x += vx * dt;
    y += vy * dt;
    
    if (y <= 0) {
      if (!hasLanded) {
        carry = x * 1.09361;
        hasLanded = true;
      }
      y = 0;
      if (vy < -1.5) {
        vy = -vy * firmness;
        vx = vx * friction; 
      } else {
        vy = 0;
        let rollDecel = g * (1 - friction); 
        vx -= rollDecel * dt;
        if (vx < 0) vx = 0;
      }
      if (vx === 0 && vy === 0) break;
    }
  }
  pts.push({ x: x, y: y });
  let total = x * 1.09361; 
  drawPath(pts, carry, total, apex * 1.09361);
}

function drawPath(pts, carry, total, apex) {
  const scaleX = 0.95; 
  const scaleY = 2.0;
  const startX = 11;
  const startY = 185;
  const d = pts.map((p, i) => {
    const sx = startX + ((p.x * 1.09361) * scaleX);
    const sy = startY - ((p.y * 1.09361) * scaleY);
    return `${i === 0 ? 'M' : 'L'}${sx},${sy}`;
  }).join(' ');
  currentPathData = d;
  document.getElementById('livePath').setAttribute('d', d);
  document.getElementById('valCarry').textContent = Math.round(carry);
  document.getElementById('valTotal').textContent = Math.round(total);
  document.getElementById('valApex').textContent = Math.round(apex);
}

function freezeArc() {
  const gLayer = document.getElementById('ghostLayer');
  const ghost = document.createElementNS("http://www.w3.org/2000/svg", "path");
  ghost.setAttribute('d', currentPathData);
  ghost.setAttribute('stroke', 'rgba(212, 175, 55, 0.25)');
  ghost.setAttribute('fill', 'none');
  ghost.setAttribute('stroke-width', '1.5');
  gLayer.appendChild(ghost);
}

function resetLab() {
  document.getElementById('ghostLayer').innerHTML = '';
}

createClubButtons();
updatePhysics(); 
</script>
</body>
</html>
