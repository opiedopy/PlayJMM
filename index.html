<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jafur Golf Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --green: #2d6a4f;
    --fairway: #40916c;
    --sky: #0a1628;
    --accent: #f4d35e;
    --red: #e07a5f;
    --white: #f0ead6;
    --panel: #0f1f36;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--sky);
    color: var(--white);
    min-height: 100vh;
    padding: 16px;
    max-width: 520px;
    margin: 0 auto;
  }

  h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    font-size: 0.7rem;
    color: #7a9cc0;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  .scoreboard {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }

  .stat {
    background: var(--panel);
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
  }

  .stat-label {
    font-size: 0.55rem;
    color: #7a9cc0;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .stat-val {
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--accent);
  }

  #feedback {
    text-align: center;
    font-size: 0.85rem;
    min-height: 24px;
    margin-bottom: 10px;
    color: #aed9e0;
    letter-spacing: 1px;
  }

  /* Flight window: tall viewBox for dramatic arcs */
  #course {
    width: 100%;
    border-radius: 12px;
    border: 1px solid #1e3a5f;
    margin-bottom: 12px;
    display: block;
    background: #061020;
  }

  .controls {
    background: var(--panel);
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }

  /* Two-row club grid for 8 clubs */
  .club-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    margin-bottom: 12px;
  }

  .club-btn {
    padding: 7px 0;
    background: #0a1628;
    border: 1px solid #1e3a5f;
    border-radius: 7px;
    color: #7a9cc0;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
  }

  .club-btn .club-name {
    display: block;
    font-weight: 500;
  }

  .club-btn .club-dist {
    display: block;
    font-size: 0.58rem;
    color: #4a6a8f;
    transition: color 0.15s;
  }

  .club-btn.active {
    background: var(--accent);
    color: #0a1628;
    border-color: var(--accent);
    font-weight: 700;
  }

  .club-btn.active .club-dist {
    color: #3a2a00;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .slider-label {
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: #7a9cc0;
    width: 56px;
    text-transform: uppercase;
  }

  .slider-val {
    font-size: 0.75rem;
    color: var(--accent);
    width: 36px;
    text-align: right;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: #1e3a5f;
    border-radius: 3px;
    outline: none;
    touch-action: manipulation;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid #0a1628;
    box-shadow: 0 0 0 2px var(--accent);
  }

  input[type=range]::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid #0a1628;
  }

  .btn-row {
    display: flex;
    gap: 6px;
  }

  .btn {
    flex: 1;
    padding: 9px 4px;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.97); }

  .btn-launch {
    background: var(--accent);
    color: #0a1628;
  }

  .btn-next {
    background: #52b788;
    color: #0a1628;
    display: none;
  }

  .btn-reset {
    background: #1e3a5f;
    color: var(--white);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .wind-dir {
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<h2>JAFUR GOLF ver 2</h2>
<div class="subtitle">Biltmore Forest CC â 18 HOLE â Ladies/White Tee</div>

<div class="scoreboard">
  <div class="stat">
    <div class="stat-label">Hole</div>
    <div class="stat-val" id="holeNum">1</div>
  </div>
  <div class="stat">
    <div class="stat-label">Dist</div>
    <div class="stat-val" id="holeDist">â</div>
  </div>
  <div class="stat">
    <div class="stat-label">Left</div>
    <div class="stat-val" id="remain">â</div>
  </div>
  <div class="stat">
    <div class="stat-label">Shot</div>
    <div class="stat-val" id="lastShot">â</div>
  </div>
  <div class="stat">
    <div class="stat-label">Score</div>
    <div class="stat-val" id="totalScore">0</div>
  </div>
</div>

<div id="feedback">Loading hole...</div>

<!--
  SVG flight window: viewBox 400 x 260.
  Ground at y=240, giving 240 SVG units of sky.
  With the GolfFly physics engine producing real apex heights,
  a 100mph driver shot (~30m peak) maps to ~130 SVG units up â 
  a dramatic, satisfying arc that fills the window.
-->
<svg id="course" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040d1a"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </linearGradient>
  </defs>

  <rect width="400" height="260" fill="url(#skyGrad)"/>

  <!-- Altitude guide lines (labelled in metres) -->
  <!-- 10m line -->
  <line x1="0" y1="197" x2="400" y2="197" stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="3,6" opacity="0.5"/>
  <text x="3" y="195" font-size="6" fill="#2a4a6f" font-family="monospace">10m</text>
  <!-- 20m line -->
  <line x1="0" y1="154" x2="400" y2="154" stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="3,6" opacity="0.5"/>
  <text x="3" y="152" font-size="6" fill="#2a4a6f" font-family="monospace">20m</text>
  <!-- 30m line -->
  <line x1="0" y1="111" x2="400" y2="111" stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="3,6" opacity="0.4"/>
  <text x="3" y="109" font-size="6" fill="#2a4a6f" font-family="monospace">30m</text>
  <!-- 40m line -->
  <line x1="0" y1="68"  x2="400" y2="68"  stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="3,6" opacity="0.3"/>
  <text x="3" y="66"   font-size="6" fill="#2a4a6f" font-family="monospace">40m</text>
  <!-- 50m line -->
  <line x1="0" y1="25"  x2="400" y2="25"  stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="3,6" opacity="0.2"/>
  <text x="3" y="23"   font-size="6" fill="#2a4a6f" font-family="monospace">50m</text>

  <!-- Ground -->
  <rect x="0" y="240" width="400" height="20" fill="url(#grassGrad)"/>

  <!-- Flag / green -->
  <ellipse cx="360" cy="240" rx="28" ry="6" fill="#52b788"/>
  <line x1="360" y1="210" x2="360" y2="240" stroke="#aaa" stroke-width="1.5"/>
  <polygon points="360,210 374,216 360,222" fill="#e07a5f"/>

  <!-- Tee marker -->
  <rect x="8" y="233" width="6" height="7" rx="1" fill="#f4d35e" opacity="0.6"/>

  <!-- Shot path and ball -->
  <path id="shotPath" stroke="#f4d35e" fill="none" stroke-width="1.5" stroke-dasharray="4,3" opacity="0"/>
  <circle id="ball" cx="11" cy="240" r="5" fill="white" stroke="#ccc" stroke-width="0.5"/>
</svg>

<div class="controls">

  <!-- 8 clubs in a 4Ã2 grid -->
  <div class="club-grid">
    <button class="club-btn active" onclick="setClub('driver',this)">
      <span class="club-name">DRIVER</span>
      <span class="club-dist">~250yd</span>
    </button>
    <button class="club-btn" onclick="setClub('3wood',this)">
      <span class="club-name">3 WOOD</span>
      <span class="club-dist">~220yd</span>
    </button>
    <button class="club-btn" onclick="setClub('5wood',this)">
      <span class="club-name">5 WOOD</span>
      <span class="club-dist">~200yd</span>
    </button>
    <button class="club-btn" onclick="setClub('4iron',this)">
      <span class="club-name">4 IRON</span>
      <span class="club-dist">~180yd</span>
    </button>
    <button class="club-btn" onclick="setClub('7iron',this)">
      <span class="club-name">7 IRON</span>
      <span class="club-dist">~150yd</span>
    </button>
    <button class="club-btn" onclick="setClub('9iron',this)">
      <span class="club-name">9 IRON</span>
      <span class="club-dist">~130yd</span>
    </button>
    <button class="club-btn" onclick="setClub('pitching',this)">
      <span class="club-name">P WEDGE</span>
      <span class="club-dist">~110yd</span>
    </button>
    <button class="club-btn" onclick="setClub('sand',this)">
      <span class="club-name">S WEDGE</span>
      <span class="club-dist">~80yd</span>
    </button>
  </div>

  <!-- Speed starts at 1 so chip shots are possible -->
  <div class="slider-row">
    <span class="slider-label">Speed</span>
    <input type="range" id="clubSpeed" min="1" max="130" value="100">
    <span class="slider-val" id="clubSpeedVal">100</span>
  </div>

  <div class="slider-row">
    <span class="slider-label">Angle</span>
    <input type="range" id="launchAngle" min="1" max="55" value="12">
    <span class="slider-val" id="launchVal">12</span>
  </div>

  <div class="slider-row">
    <span class="slider-label">Spin</span>
    <input type="range" id="spinRate" min="500" max="9000" value="2500">
    <span class="slider-val" id="spinVal">2500</span>
  </div>

  <div class="slider-row">
    <span class="slider-label">Wind <span class="wind-dir" id="windDir">â</span></span>
    <input type="range" id="windSpeed" min="-30" max="30" value="0">
    <span class="slider-val" id="windVal">0</span>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-launch" id="launchBtn" onclick="launchShot()">LAUNCH</button>
  <button class="btn btn-next"   id="nextBtn"   onclick="goNextHole()">NEXT HOLE â¶</button>
  <button class="btn btn-reset"  onclick="resetGame()">RESET</button>
</div>

<script>
const DISTANCES = [314,397,129,425,385,366,409,390,149,375,354,313,443,271,193,395,421,365];

// SVG layout constants matching viewBox 400Ã260
const SVG_GROUND  = 240;   // y-coordinate of ground
const SVG_WIDTH   = 400;
const BALL_START_X = 11;

// Vertical scale: 1 real metre â how many SVG units upward from ground.
// Sky space above ground = 240 SVG units.
// Map 0â55m real height â 0â215 SVG units so a 50m peak sits near the top.
const METRES_TO_SVG = 215 / 55;  // â 3.91 SVG units per metre

// ââ Club definitions ââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// speedMult  : multiplied onto the user's club-speed slider
// launchPreset : suggested launch angle when club is selected
// spinPreset   : suggested spin rpm when club is selected
// rollMult   : rollout multiplier after landing
const CLUBS = {
  driver:   { speedMult: 1.48, spinPreset: 2500, launchPreset: 12, rollMult: 1.35 },
  '3wood':  { speedMult: 1.38, spinPreset: 3000, launchPreset: 14, rollMult: 1.15 },
  '5wood':  { speedMult: 1.28, spinPreset: 3500, launchPreset: 16, rollMult: 1.00 },
  '4iron':  { speedMult: 1.15, spinPreset: 4500, launchPreset: 18, rollMult: 0.90 },
  '7iron':  { speedMult: 1.00, spinPreset: 5500, launchPreset: 22, rollMult: 0.75 },
  '9iron':  { speedMult: 0.90, spinPreset: 7000, launchPreset: 26, rollMult: 0.60 },
  pitching: { speedMult: 0.83, spinPreset: 7500, launchPreset: 30, rollMult: 0.50 },
  sand:     { speedMult: 0.72, spinPreset: 9000, launchPreset: 42, rollMult: 0.35 },
};

const game = {
  hole: 1,
  remaining: 0,
  strokesHole: 0,
  total: 0,
  busy: false,
  onGreen: false,
  ballX: BALL_START_X
};

let selectedClub = 'driver';

function setClub(club, el) {
  selectedClub = club;
  document.querySelectorAll('.club-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  // Auto-set sliders to sensible defaults for this club
  const c = CLUBS[club];
  document.getElementById('launchAngle').value = c.launchPreset;
  document.getElementById('launchVal').textContent  = c.launchPreset;
  document.getElementById('spinRate').value   = c.spinPreset;
  document.getElementById('spinVal').textContent    = c.spinPreset;
}

// ââ Physics engine (ported from GolfFly-Sim "clean loop") ââââââââââââââââ
// Uses full aerodynamic model: air density, ball geometry, Magnus lift.
// smashFactor is baked into CLUBS[].speedMult; ballSpeedMs = sliderMph * 0.447 * speedMult
function simulate(sliderSpeedMph, launchDeg, spinRpm, windMph) {
  const windMs    = windMph * 0.447;
  const rho       = 1.2;          // air density kg/mÂ³
  const ballMass  = 0.046;        // kg
  const ballRadius = 0.021;       // m
  const Cd        = 0.30;
  const A         = Math.PI * ballRadius * ballRadius;
  const dt        = 0.02;

  const mods    = CLUBS[selectedClub];
  const v0      = sliderSpeedMph * 0.447 * mods.speedMult;
  const theta   = launchDeg * Math.PI / 180;
  const omega   = spinRpm * 2 * Math.PI / 60;

  let vx = v0 * Math.cos(theta);
  let vy = v0 * Math.sin(theta);
  let x  = 0, y = 0;
  const pts = [{ x, y }];

  for (let i = 0; i < 10000; i++) {
    const relVx  = vx - windMs;                          // velocity relative to air (horizontal)
    const relSpd = Math.sqrt(relVx * relVx + vy * vy);  // speed relative to air
    if (relSpd < 0.001) break;

    const Fd = 0.5 * rho * relSpd * relSpd * A * Cd;   // drag force (N)
    const Fl = 0.000012 * omega * relSpd;               // Magnus lift force (N)

    const ax = -(Fd / ballMass) * (relVx / relSpd);
    const ay = -(Fd / ballMass) * (vy    / relSpd) - 9.81 + Fl / ballMass;

    vx += ax * dt;
    vy += ay * dt;
    x  += vx * dt;
    y  += vy * dt;

    if (y < 0) break;
    pts.push({ x, y });
    if (pts.length > 10000) break;
  }

  const carryM   = Math.max(0, x);
  const carryYds = carryM * 1.09361;
  return { carryYds, pts };
}

function getRollout(carryYds, spin, rollMult) {
  return carryYds * 0.12 * rollMult * (2500 / Math.max(spin, 500));
}

// ââ Animation âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function animateShot(pts, carryYds, totalYds, holeDist, cb) {
  const scaleX  = (390 - 20) / holeDist;
  const startX  = game.ballX;
  const landX   = Math.min(startX + carryYds  * scaleX, 388);
  const endX    = Math.min(startX + totalYds  * scaleX, 388);

  const carryPtsX = pts[pts.length - 1].x || 1;
  const scaled = pts.map(p => ({
    x: startX + (p.x / carryPtsX) * (landX - startX),
    y: SVG_GROUND - p.y * METRES_TO_SVG
  }));

  // Bounce sequence
  const peakMetres = Math.max(...pts.map(p => p.y), 0.01);
  let bH = Math.min(peakMetres * METRES_TO_SVG * 0.18, 28);
  let bD = (endX - landX) / 3;
  let cur = scaled[scaled.length - 1];

  for (let b = 0; b < 3; b++) {
    for (let i = 0; i <= 15; i++) {
      const t = i / 15;
      scaled.push({
        x: cur.x + bD * t,
        y: SVG_GROUND - bH * Math.sin(Math.PI * t)
      });
    }
    cur = scaled[scaled.length - 1];
    bH *= 0.45;
    bD *= 0.65;
  }
  for (let i = 1; i <= 20; i++) {
    scaled.push({ x: cur.x + (endX - cur.x) * (i / 20), y: SVG_GROUND });
  }

  const shotPath = document.getElementById('shotPath');
  const d = scaled.map((p, i) => `${i ? 'L' : 'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  shotPath.setAttribute('d', d);
  shotPath.setAttribute('opacity', '1');

  const ball     = document.getElementById('ball');
  const duration = 1800;
  const start    = performance.now();

  function frame(now) {
    const t      = Math.min((now - start) / duration, 1);
    const eased  = 1 - Math.pow(1 - t, 2);
    const idx    = Math.floor(eased * (scaled.length - 1));
    const p      = scaled[idx];
    ball.setAttribute('cx', p.x.toFixed(1));
    ball.setAttribute('cy', p.y.toFixed(1));
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      game.ballX = endX;
      cb();
    }
  }
  requestAnimationFrame(frame);
}

// ââ Game logic âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function setFeedback(msg, color) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.style.color = color || '#aed9e0';
}

function updateScoreboard(lastShotYds) {
  document.getElementById('holeNum').textContent  = game.hole;
  document.getElementById('holeDist').textContent = DISTANCES[game.hole - 1];
  document.getElementById('remain').textContent   = Math.max(0, game.remaining).toFixed(0);
  document.getElementById('totalScore').textContent = game.total;
  if (lastShotYds !== undefined)
    document.getElementById('lastShot').textContent = lastShotYds.toFixed(0);
}

function setLaunchEnabled(enabled) {
  document.getElementById('launchBtn').disabled = !enabled;
}

function startHole() {
  game.remaining   = DISTANCES[game.hole - 1];
  game.strokesHole = 0;
  game.onGreen     = false;
  game.busy        = false;
  game.ballX       = BALL_START_X;

  document.getElementById('lastShot').textContent = 'â';
  document.getElementById('ball').setAttribute('cx', BALL_START_X);
  document.getElementById('ball').setAttribute('cy', SVG_GROUND);
  document.getElementById('shotPath').setAttribute('opacity', '0');

  updateScoreboard();
  setFeedback(`Hole ${game.hole} â ${DISTANCES[game.hole - 1]} yds. Hit it!`);
  setLaunchEnabled(true);
}

function finishHole(msg) {
  setLaunchEnabled(false);
  const putts = Math.random() < 0.5 ? 1 : 2;
  game.total += putts;
  updateScoreboard();
  const puttMsg = putts === 1 ? 'ð¯ One-putt!' : 'â³ Two-putt.';
  setTimeout(() => {
    setFeedback(`${msg} ${puttMsg} Hole score: ${game.strokesHole + putts}`);
    document.getElementById('nextBtn').style.display  = 'block';
    document.getElementById('launchBtn').style.display = 'none';
  }, 400);
}

function goNextHole() {
  document.getElementById('nextBtn').style.display   = 'none';
  document.getElementById('launchBtn').style.display = 'block';
  if (game.hole >= 18) {
    setTimeout(() => alert(`ð Round complete!\nTotal strokes: ${game.total}`), 200);
    return;
  }
  game.hole++;
  startHole();
}

function launchShot() {
  if (game.busy) return;
  game.busy = true;
  setLaunchEnabled(false);

  const speed  = +document.getElementById('clubSpeed').value;
  const launch = +document.getElementById('launchAngle').value;
  const spin   = +document.getElementById('spinRate').value;
  const wind   = +document.getElementById('windSpeed').value;

  const { carryYds, pts } = simulate(speed, launch, spin, wind);
  const mods     = CLUBS[selectedClub];
  const rollout  = getRollout(carryYds, spin, mods.rollMult);
  const totalYds = carryYds + rollout;

  game.strokesHole++;
  game.total++;
  updateScoreboard(totalYds);

  const holeDist = DISTANCES[game.hole - 1];

  animateShot(pts, carryYds, totalYds, holeDist, false, () => {
    if (totalYds > game.remaining) {
      const over = (totalYds - game.remaining).toFixed(0);
      game.total++;
      game.strokesHole++;
      updateScoreboard(totalYds);
      game.remaining = 0;
      finishHole(`Long by ${over} yds! 1 chip back.`);
    } else {
      game.remaining -= totalYds;
      updateScoreboard(totalYds);

      if (game.remaining <= 15) {
        game.remaining = 0;
        updateScoreboard(totalYds);
        finishHole(`On the green! ðï¸`);
      } else {
        setFeedback(`ð ${game.remaining.toFixed(0)} yds remaining.`);
        game.busy = false;
        setLaunchEnabled(true);
      }
    }
  });
}

function resetGame() {
  game.hole  = 1;
  game.total = 0;
  startHole();
}

  const v = +e.target.value;
  document.getElementById('windVal').textContent  = v;
  document.getElementById('windDir').textContent  = v > 0 ? 'â' : v < 0 ? 'â' : 'â';
};
