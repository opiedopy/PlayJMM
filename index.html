<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jafur Golf Game</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    margin:0; padding:20px;
    background: linear-gradient(135deg,#0a0a0a,#1a1a2e);
    color:#fff;
}

.title { text-align:center; font-size:2em; margin-bottom:10px; }

.scoreboard {
    background: rgba(0,191,255,0.1);
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    text-align:center;
}

.feedback {
    text-align:center;
    margin-bottom:15px;
    font-size:1.1em;
    color:#00bfff;
}

.slider { width:100%; margin-bottom:10px; }

button {
    margin-top:10px;
    padding:12px 24px;
    border:none;
    border-radius:20px;
    background:#00bfff;
    color:white;
    font-weight:bold;
    font-size:16px;
}

#course {
    margin-top:20px;
    background:#111;
    border-radius:12px;
}

.club-select {
    margin:10px 0;
    text-align:center;
}

select {
    padding:8px;
    border-radius:8px;
    font-size:16px;
}
</style>
</head>

<body>

<div class="title">⛳ Jafur Golf Game</div>

<div class="scoreboard">
    <div>Hole: <span id="holeNum">1</span> / 18</div>
    <div>Distance: <span id="holeDist">---</span> yd</div>
    <div>Remaining: <span id="remain">---</span> yd</div>
    <div>Strokes (Hole): <span id="strokesHole">0</span></div>
    <div>Total Score: <span id="totalScore">0</span></div>
</div>

<div class="feedback" id="feedback">Distance to green: --</div>

<div class="club-select">
    Club:
    <select id="club">
        <option value="driver">Driver</option>
        <option value="iron">Iron</option>
        <option value="wedge">Wedge</option>
    </select>
</div>

Club Speed: <span id="clubSpeedVal">100</span><br>
<input type="range" id="clubSpeed" class="slider" min="80" max="130" value="100">

Launch Angle: <span id="launchVal">12</span><br>
<input type="range" id="launchAngle" class="slider" min="8" max="20" value="12">

Spin Rate: <span id="spinVal">2500</span><br>
<input type="range" id="spinRate" class="slider" min="2000" max="3500" value="2500">

Wind: <span id="windVal">0</span><br>
<input type="range" id="windSpeed" class="slider" min="-30" max="30" value="0">

<button onclick="launchShot()">🏌️ Launch</button>
<button onclick="resetGame()">🔄 Reset</button>

<svg id="course" viewBox="0 0 400 160">
    <line x1="10" y1="140" x2="390" y2="140" stroke="#555"/>
    <rect id="green" x="300" y="120" width="30" height="20" fill="green"/>
    <path id="path" stroke="#00bfff" fill="none" stroke-width="2" opacity="0"/>
    <circle id="ball" cx="10" cy="140" r="5" fill="white"/>
</svg>

<script>

// --- GAME STATE ---
const game = {
    hole: 1,
    distances: [410,530,165,390,420,210,560,440,180,400,520,170,385,430,200,550,445,175],
    remaining: 0,
    strokesHole: 0,
    total: 0
};

// --- CLUB MODIFIERS ---
function applyClub(speed, spin) {
    const club = clubSelect.value;
    if (club === "driver") return { speed: speed*1.05, spin: spin*0.85 };
    if (club === "iron") return { speed: speed*0.95, spin: spin*1.05 };
    return { speed: speed*0.8, spin: spin*1.2 };
}

// --- INIT ---
function startHole() {
    game.remaining = game.distances[game.hole-1];
    game.strokesHole = 0;
    updateUI(`Distance to green: ${game.remaining.toFixed(0)} yd`);
    moveBall(0);
}

// --- UI ---
function updateUI(text="") {
    holeNum.textContent = game.hole;
    holeDist.textContent = game.distances[game.hole-1];
    remain.textContent = Math.max(0,game.remaining).toFixed(0);
    strokesHole.textContent = game.strokesHole;
    totalScore.textContent = game.total;
    feedback.textContent = text;
}

// --- PHYSICS (returns path) ---
function simulate(speed, launch, spin, wind) {
    const windMs = wind*0.447;
    const g=9.81, rho=1.2, m=0.046, r=0.021;
    const v0 = speed*0.447*1.48;
    const th = launch*Math.PI/180;

    let vx=v0*Math.cos(th), vy=v0*Math.sin(th);
    let x=0,y=0, pts=[];
    const dt=0.02;

    for(let i=0;i<10000;i++){
        pts.push({x,y});
        const relVx = vx-windMs;
        const sp = Math.sqrt(relVx*relVx+vy*vy);
        const drag=0.5*rho*sp*sp*Math.PI*r*r*0.3;
        const lift=0.000012*(spin*2*Math.PI/60)*sp;

        vx += (-(drag/m)*(relVx/sp))*dt;
        vy += (-(drag/m)*(vy/sp)-g+lift/m)*dt;

        x+=vx*dt; y+=vy*dt;
        if(y<0) break;
    }

    return {
        dist: x*1.094*1.12,
        pts: pts
    };
}

// --- DRAW + ANIMATE ---
function animateShot(pts, maxDist, callback) {
    const scaled = pts.map(p=>{
        return {
            x: 10 + (p.x/maxDist)*350,
            y: 140 - (p.y/Math.max(...pts.map(q=>q.y)))*100
        };
    });

    const d = scaled.map((p,i)=>`${i?'L':'M'}${p.x},${p.y}`).join(" ");
    path.setAttribute("d", d);
    path.setAttribute("opacity","1");

    let i=0;
    function step(){
        if(i>=scaled.length){
            callback();
            return;
        }
        ball.setAttribute("cx", scaled[i].x);
        ball.setAttribute("cy", scaled[i].y);
        i+=3;
        requestAnimationFrame(step);
    }
    step();
}

// --- MOVE BALL FINAL ---
function moveBall(progress){
    ball.setAttribute("cx", 10+progress*350);
    ball.setAttribute("cy",140);
}

// --- MAIN ---
function launchShot() {
    let speed=+clubSpeed.value;
    let spin=+spinRate.value;
    const mod=applyClub(speed,spin);
    speed=mod.speed; spin=mod.spin;

    const launch=+launchAngle.value;
    const wind=+windSpeed.value;

    const sim = simulate(speed,launch,spin,wind);
    const shot=sim.dist;

    const holeDist=game.distances[game.hole-1];
    const prev=game.remaining;

    game.strokesHole++; game.total++;

    animateShot(sim.pts, sim.pts[sim.pts.length-1].x, ()=>{

        let feedback="";

        if(shot>prev){
            const over=shot-prev;
            game.total++; game.strokesHole++;
            game.remaining=0;
            feedback=`Long by ${over.toFixed(0)} yd`;
        } else if(shot>=prev-1){
            game.remaining=0;
            feedback="On the green";
        } else {
            game.remaining-=shot;
            feedback=`Distance to green: ${game.remaining.toFixed(0)} yd`;
        }

        updateUI(feedback);

        if(game.remaining<=0){
            setTimeout(nextHole,1000);
        }
    });
}

// --- NEXT ---
function nextHole(){
    if(game.hole>=18){
        alert("🏁 Round Complete! Score: "+game.total);
        return;
    }
    game.hole++;
    startHole();
}

// --- RESET ---
function resetGame(){
    game.hole=1; game.total=0;
    startHole();
}

// --- SLIDERS ---
clubSpeed.oninput=()=>clubSpeedVal.textContent=clubSpeed.value;
launchAngle.oninput=()=>launchVal.textContent=launchAngle.value;
spinRate.oninput=()=>spinVal.textContent=spinRate.value;
windSpeed.oninput=()=>windVal.textContent=windSpeed.value;

startHole();

</script>

</body>
</html>
