<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jafur Golf Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --green: #2d6a4f;
    --fairway: #40916c;
    --sky: #0a1628;
    --accent: #f4d35e;
    --red: #e07a5f;
    --white: #f0ead6;
    --panel: #0f1f36;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--sky);
    color: var(--white);
    min-height: 100vh;
    padding: 16px;
    max-width: 520px;
    margin: 0 auto;
  }

  h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    font-size: 0.7rem;
    color: #7a9cc0;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  .scoreboard {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }

  .stat {
    background: var(--panel);
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
  }

  .stat-label {
    font-size: 0.55rem;
    color: #7a9cc0;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .stat-val {
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--accent);
  }

  #feedback {
    text-align: center;
    font-size: 0.85rem;
    min-height: 24px;
    margin-bottom: 10px;
    color: #aed9e0;
    letter-spacing: 1px;
  }

  /* Enlarged flight window: taller viewBox area */
  #course {
    width: 100%;
    border-radius: 12px;
    border: 1px solid #1e3a5f;
    margin-bottom: 12px;
    display: block;
    background: #061020;
  }

  .controls {
    background: var(--panel);
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .club-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .club-btn {
    flex: 1;
    padding: 8px 0;
    background: #0a1628;
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    color: #7a9cc0;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .club-btn.active {
    background: var(--accent);
    color: #0a1628;
    border-color: var(--accent);
    font-weight: 700;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .slider-label {
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: #7a9cc0;
    width: 56px;
    text-transform: uppercase;
  }

  .slider-val {
    font-size: 0.75rem;
    color: var(--accent);
    width: 36px;
    text-align: right;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: #1e3a5f;
    border-radius: 3px;
    outline: none;
    touch-action: manipulation;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid #0a1628;
    box-shadow: 0 0 0 2px var(--accent);
  }

  input[type=range]::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid #0a1628;
  }

  .btn-row {
    display: flex;
    gap: 6px;
  }

  .btn {
    flex: 1;
    padding: 9px 4px;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.97); }

  .btn-launch {
    background: var(--accent);
    color: #0a1628;
  }

  .btn-next {
    background: #52b788;
    color: #0a1628;
    display: none;
  }

  .btn-reset {
    background: #1e3a5f;
    color: var(--white);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .wind-dir {
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<h2>⛳ JAFUR GOLF</h2>
<div class="subtitle">Biltmore Forest CC - 18 HOLE - Ladies/White Tee</div>

<div class="scoreboard">
  <div class="stat">
    <div class="stat-label">Hole</div>
    <div class="stat-val" id="holeNum">1</div>
  </div>
  <div class="stat">
    <div class="stat-label">Dist</div>
    <div class="stat-val" id="holeDist">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Left</div>
    <div class="stat-val" id="remain">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Shot</div>
    <div class="stat-val" id="lastShot">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Score</div>
    <div class="stat-val" id="totalScore">0</div>
  </div>
</div>

<div id="feedback">Loading hole...</div>

<!--
  ENLARGED WINDOW: viewBox is now 400x200 (was 400x120).
  Ground line sits at y=185 (was 95), giving ~180px of sky for flight arc.
  This allows accurate height representation — a 300yd drive peaks ~30m (~33yds)
  high which now maps to proportional arc height in the view.
-->
<svg id="course" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#061020"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </linearGradient>
    <!-- Altitude ruler ticks on left edge -->
  </defs>

  <rect width="400" height="200" fill="url(#skyGrad)"/>

  <!-- Subtle altitude guide lines -->
  <line x1="0" y1="135" x2="400" y2="135" stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="3,6" opacity="0.5"/>
  <line x1="0" y1="85"  x2="400" y2="85"  stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="3,6" opacity="0.5"/>
  <line x1="0" y1="35"  x2="400" y2="35"  stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="3,6" opacity="0.3"/>
  <!-- Labels for altitude lines -->
  <text x="3" y="133" font-size="6" fill="#2a4a6f" font-family="monospace">15m</text>
  <text x="3" y="83"  font-size="6" fill="#2a4a6f" font-family="monospace">30m</text>
  <text x="3" y="33"  font-size="6" fill="#2a4a6f" font-family="monospace">50m</text>

  <!-- Ground -->
  <rect x="0" y="185" width="400" height="15" fill="url(#grassGrad)"/>

  <!-- Flag / green -->
  <ellipse cx="360" cy="185" rx="28" ry="6" fill="#52b788"/>
  <line x1="360" y1="155" x2="360" y2="185" stroke="#aaa" stroke-width="1.5"/>
  <polygon points="360,155 374,161 360,167" fill="#e07a5f"/>

  <!-- Tee marker -->
  <rect x="8" y="178" width="6" height="7" rx="1" fill="#f4d35e" opacity="0.6"/>

  <!-- Shot path and ball -->
  <path id="shotPath" stroke="#f4d35e" fill="none" stroke-width="1.5" stroke-dasharray="4,3" opacity="0"/>
  <circle id="ball" cx="11" cy="185" r="5" fill="white" stroke="#ccc" stroke-width="0.5"/>
</svg>

<div class="controls">
  <div class="club-row">
    <button class="club-btn active" onclick="setClub('driver',this)">DRIVER</button>
    <button class="club-btn" onclick="setClub('iron',this)">IRON</button>
    <button class="club-btn" onclick="setClub('wedge',this)">WEDGE</button>
  </div>

  <!-- Speed now starts at 1 mph so short tap shots near the green are possible -->
  <div class="slider-row">
    <span class="slider-label">Speed</span>
    <input type="range" id="clubSpeed" min="1" max="130" value="100">
    <span class="slider-val" id="clubSpeedVal">100</span>
  </div>

  <div class="slider-row">
    <span class="slider-label">Angle</span>
    <input type="range" id="launchAngle" min="8" max="20" value="12">
    <span class="slider-val" id="launchVal">12</span>
  </div>

  <div class="slider-row">
    <span class="slider-label">Spin</span>
    <input type="range" id="spinRate" min="2000" max="3500" value="2500">
    <span class="slider-val" id="spinVal">2500</span>
  </div>

  <div class="slider-row">
    <span class="slider-label">Wind <span class="wind-dir" id="windDir">—</span></span>
    <input type="range" id="windSpeed" min="-30" max="30" value="0">
    <span class="slider-val" id="windVal">0</span>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-launch" id="launchBtn" onclick="launchShot()">LAUNCH</button>
  <button class="btn btn-next"   id="nextBtn"   onclick="goNextHole()">NEXT HOLE ▶</button>
  <button class="btn btn-reset"  onclick="resetGame()">RESET</button>
</div>

<script>
const DISTANCES = [314,397,129,425,385,366,409,390,149,375,354,313,443,271,193,395,421,365];

// SVG layout constants matching the new viewBox (400x200)
const SVG_GROUND = 185;   // y-coordinate of ground in SVG units
const SVG_WIDTH  = 400;
const BALL_START_X = 11;

// Scale: 1 metre of real altitude = how many SVG units upward
// Ground to top of sky ≈ 185 SVG units. We map 0–55m real height → 0–150 SVG units
// so a 50m peak sits just below the top guide line, feeling accurate & visible.
const METRES_TO_SVG = 150 / 55;  // ≈ 2.73 SVG units per metre

const game = {
  hole: 1,
  remaining: 0,
  strokesHole: 0,
  total: 0,
  busy: false,
  onGreen: false,
  ballX: BALL_START_X
};

let selectedClub = 'driver';

function setClub(club, el) {
  selectedClub = club;
  document.querySelectorAll('.club-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function getClubMods() {
  if (selectedClub === 'driver') return { speedMult: 1.05, spinMult: 0.85, rollMult: 1.3 };
  if (selectedClub === 'iron')   return { speedMult: 0.95, spinMult: 1.05, rollMult: 1.0 };
  return                                 { speedMult: 0.80, spinMult: 1.20, rollMult: 0.6 };
}

/**
 * Physics simulation — returns carry distance in yards AND the
 * full trajectory in metres {x, y} so we can render true arc height.
 */
function simulate(speedMph, launchDeg, spin, windMph) {
  const windMs  = windMph * 0.447;
  const speedMs = speedMph * 0.44704;
  const g       = 9.81;
  const dt      = 0.05;

  let vx = speedMs * Math.cos(launchDeg * Math.PI / 180);
  let vy = speedMs * Math.sin(launchDeg * Math.PI / 180);
  let x  = 0, y = 0;
  const pts = [{x, y}];

  for (let i = 0; i < 2000; i++) {
    const drag = 0.003;
    vx += (-drag * vx + 0.002 * windMs) * dt;
    vy += (-drag * vy - g) * dt;
    x  += vx * dt;
    y  += vy * dt;
    if (y < 0) break;
    pts.push({x, y});
  }

  const carryM   = Math.max(0, x);
  const carryYds = carryM * 1.09361;
  return { carryYds, pts };  // pts.y is real metres above ground
}

function getRollout(carryYds, spin, rollMult) {
  return carryYds * 0.12 * rollMult * (2500 / spin);
}

/**
 * animateShot — maps the real physics trajectory (metres) directly to SVG coordinates.
 * Horizontal: scaled so the carry lands at the correct x position relative to hole distance.
 * Vertical:   1 metre real = METRES_TO_SVG SVG units upward from SVG_GROUND.
 * This gives an accurate visual representation of peak height.
 */
function animateShot(pts, carryYds, totalYds, holeDist, onGreen, cb) {
  const scaleX   = (390 - 20) / holeDist;  // SVG pixels per yard (horizontal)
  const startX   = game.ballX;
  const landX    = startX + carryYds * scaleX;
  const endX     = startX + totalYds * scaleX;
  const clampedEnd = Math.min(endX, 388);

  // Map real trajectory to SVG coordinates using actual height data
  const carryPtsX = pts[pts.length - 1].x || 1;  // real carry in metres
  const scaled = pts.map(p => ({
    x: startX + (p.x / carryPtsX) * (landX - startX),
    y: SVG_GROUND - p.y * METRES_TO_SVG          // accurate altitude mapping
  }));

  // Bounce sequence after landing: use a fraction of peak height, decaying
  const peakMetres = Math.max(...pts.map(p => p.y), 0.01);
  let bH = Math.min(peakMetres * METRES_TO_SVG * 0.18, 22);  // first bounce ≈18% of flight peak
  let bD = (clampedEnd - landX) / 3;
  let cur = scaled[scaled.length - 1];

  for (let b = 0; b < 3; b++) {
    for (let i = 0; i <= 15; i++) {
      const t = i / 15;
      scaled.push({
        x: cur.x + bD * t,
        y: SVG_GROUND - bH * Math.sin(Math.PI * t)
      });
    }
    cur = scaled[scaled.length - 1];
    bH *= 0.45;
    bD *= 0.65;
  }
  // Roll to final rest
  for (let i = 1; i <= 20; i++) {
    scaled.push({ x: cur.x + (clampedEnd - cur.x) * (i / 20), y: SVG_GROUND });
  }

  const shotPath = document.getElementById('shotPath');
  const d = scaled.map((p, i) => `${i ? 'L' : 'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  shotPath.setAttribute('d', d);
  shotPath.setAttribute('opacity', '1');

  const ball     = document.getElementById('ball');
  const duration = 1800;
  const start    = performance.now();

  function frame(now) {
    let t      = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 2);
    const idx  = Math.floor(eased * (scaled.length - 1));
    const p    = scaled[idx];
    ball.setAttribute('cx', p.x.toFixed(1));
    ball.setAttribute('cy', p.y.toFixed(1));
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      game.ballX = clampedEnd;
      cb();
    }
  }
  requestAnimationFrame(frame);
}

function setFeedback(msg, color) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.style.color = color || '#aed9e0';
}

function updateScoreboard(lastShotYds) {
  document.getElementById('holeNum').textContent    = game.hole;
  document.getElementById('holeDist').textContent   = DISTANCES[game.hole - 1];
  document.getElementById('remain').textContent     = Math.max(0, game.remaining).toFixed(0);
  document.getElementById('totalScore').textContent = game.total;
  if (lastShotYds !== undefined)
    document.getElementById('lastShot').textContent = lastShotYds.toFixed(0);
}

function setLaunchEnabled(enabled) {
  document.getElementById('launchBtn').disabled = !enabled;
}

function startHole() {
  game.remaining   = DISTANCES[game.hole - 1];
  game.strokesHole = 0;
  game.onGreen     = false;
  game.busy        = false;
  game.ballX       = BALL_START_X;

  document.getElementById('lastShot').textContent = '—';
  document.getElementById('ball').setAttribute('cx', BALL_START_X);
  document.getElementById('ball').setAttribute('cy', SVG_GROUND);
  document.getElementById('shotPath').setAttribute('opacity', '0');

  updateScoreboard();
  setFeedback(`Hole ${game.hole} — ${DISTANCES[game.hole - 1]} yds. Hit it!`);
  setLaunchEnabled(true);
}

function finishHole(msg) {
  setLaunchEnabled(false);
  const putts = Math.random() < 0.5 ? 1 : 2;
  game.total += putts;
  updateScoreboard();
  const puttMsg = putts === 1 ? '🎯 One-putt!' : '⛳ Two-putt.';
  setTimeout(() => {
    setFeedback(`${msg} ${puttMsg} Hole score: ${game.strokesHole + putts}`);
    document.getElementById('nextBtn').style.display = 'block';
    document.getElementById('launchBtn').style.display = 'none';
  }, 400);
}

function goNextHole() {
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('launchBtn').style.display = 'block';
  if (game.hole >= 18) {
    setTimeout(() => alert(`🏁 Round complete!\nTotal strokes: ${game.total}`), 200);
    return;
  }
  game.hole++;
  startHole();
}

function launchShot() {
  if (game.busy) return;
  game.busy = true;
  setLaunchEnabled(false);

  const mods   = getClubMods();
  const speed  = +document.getElementById('clubSpeed').value  * mods.speedMult;
  const launch = +document.getElementById('launchAngle').value;
  const spin   = +document.getElementById('spinRate').value   * mods.spinMult;
  const wind   = +document.getElementById('windSpeed').value;

  const { carryYds, pts } = simulate(speed, launch, spin, wind);
  const rollout  = getRollout(carryYds, spin, mods.rollMult);
  const totalYds = carryYds + rollout;

  game.strokesHole++;
  game.total++;
  updateScoreboard(totalYds);

  const holeDist = DISTANCES[game.hole - 1];

  animateShot(pts, carryYds, totalYds, holeDist, false, () => {
    if (totalYds > game.remaining) {
      const over = (totalYds - game.remaining).toFixed(0);
      game.total++;
      game.strokesHole++;
      updateScoreboard(totalYds);
      game.remaining = 0;
      finishHole(`Long by ${over} yds! 1 chip back.`);
    } else {
      game.remaining -= totalYds;
      updateScoreboard(totalYds);

      if (game.remaining <= 15) {
        game.remaining = 0;
        updateScoreboard(totalYds);
        finishHole(`On the green! 🏌️`);
      } else {
        setFeedback(`📍 ${game.remaining.toFixed(0)} yds remaining.`);
        game.busy = false;
        setLaunchEnabled(true);
      }
    }
  });
}

function resetGame() {
  game.hole  = 1;
  game.total = 0;
  startHole();
}

document.getElementById('clubSpeed').oninput  = e => document.getElementById('clubSpeedVal').textContent = e.target.value;
document.getElementById('launchAngle').oninput = e => document.getElementById('launchVal').textContent   = e.target.value;
document.getElementById('spinRate').oninput   = e => document.getElementById('spinVal').textContent     = e.target.value;
document.getElementById('windSpeed').oninput  = e => {
  const v = +e.target.value;
  document.getElementById('windVal').textContent = v;
  document.getElementById('windDir').textContent = v > 0 ? '→' : v < 0 ? '←' : '—';
};

startHole();
</script>
</body>
</html>
