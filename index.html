<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jafur Golf Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --green: #2d6a4f;
    --fairway: #40916c;
    --sky: #0a1628;
    --accent: #f4d35e;
    --red: #e07a5f;
    --white: #f0ead6;
    --panel: #0f1f36;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--sky);
    color: var(--white);
    min-height: 100vh;
    padding: 16px;
    max-width: 520px;
    margin: 0 auto;
  }

  h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    font-size: 0.7rem;
    color: #7a9cc0;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  .scoreboard {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }

  .stat {
    background: var(--panel);
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
  }

  .stat-label {
    font-size: 0.55rem;
    color: #7a9cc0;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .stat-val {
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--accent);
  }

  #feedback {
    text-align: center;
    font-size: 0.85rem;
    min-height: 24px;
    margin-bottom: 10px;
    color: #aed9e0;
    letter-spacing: 1px;
  }

  #course {
    width: 100%;
    border-radius: 12px;
    border: 1px solid #1e3a5f;
    margin-bottom: 12px;
    display: block;
    background: #061020;
  }

  .controls {
    background: var(--panel);
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .club-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .club-btn {
    padding: 8px 12px;
    background: #0a1628;
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    color: #7a9cc0;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    flex: 1;
    min-width: 68px;
    text-align: center;
  }

  .club-btn.active {
    background: var(--accent);
    color: #0a1628;
    border-color: var(--accent);
    font-weight: 700;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .slider-label {
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: #7a9cc0;
    width: 68px;
    text-transform: uppercase;
  }

  .slider-val {
    font-size: 0.75rem;
    color: var(--accent);
    width: 36px;
    text-align: right;
  }

    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: #1e3a5f;
    border-radius: 3px;
    outline: none;
  }
