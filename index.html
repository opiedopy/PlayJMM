<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jafur Golf Game</title>

<style>
body { font-family: -apple-system; background:#0a0a0a; color:#fff; padding:20px; }
.scoreboard, .feedback { text-align:center; margin-bottom:10px; }
.slider { width:100%; margin-bottom:10px; }
button { padding:10px 20px; margin:5px; background:#00bfff; border:none; border-radius:10px; color:white; }
#course { background:#111; margin-top:20px; border-radius:10px; }
</style>
</head>

<body>

<h2>⛳ Jafur Golf Game</h2>

<div class="scoreboard">
Hole <span id="holeNum"></span> |
Distance <span id="holeDist"></span> yd |
Remaining <span id="remain"></span> yd |
Strokes <span id="strokesHole"></span> |
Total <span id="totalScore"></span>
</div>

<div class="feedback" id="feedback"></div>

<select id="club">
<option value="driver">Driver</option>
<option value="iron">Iron</option>
<option value="wedge">Wedge</option>
</select>

<br><br>

Speed <span id="clubSpeedVal">100</span>
<input type="range" id="clubSpeed" class="slider" min="80" max="130" value="100">

Launch <span id="launchVal">12</span>
<input type="range" id="launchAngle" class="slider" min="8" max="20" value="12">

Spin <span id="spinVal">2500</span>
<input type="range" id="spinRate" class="slider" min="2000" max="3500" value="2500">

Wind <span id="windVal">0</span>
<input type="range" id="windSpeed" class="slider" min="-30" max="30" value="0">

<button onclick="launchShot()">Launch</button>
<button onclick="resetGame()">Reset</button>

<svg id="course" viewBox="0 0 400 160">
<line x1="10" y1="140" x2="390" y2="140" stroke="#555"/>
<rect x="300" y="120" width="30" height="20" fill="green"/>
<path id="path" stroke="#00bfff" fill="none" stroke-width="2" opacity="0"/>
<circle id="ball" cx="10" cy="140" r="5" fill="white"/>
</svg>

<script>

// --- DOM ---
const holeNum = document.getElementById("holeNum");
const holeDist = document.getElementById("holeDist");
const remain = document.getElementById("remain");
const strokesHole = document.getElementById("strokesHole");
const totalScore = document.getElementById("totalScore");
const feedback = document.getElementById("feedback");

const clubSelect = document.getElementById("club");
const clubSpeed = document.getElementById("clubSpeed");
const launchAngle = document.getElementById("launchAngle");
const spinRate = document.getElementById("spinRate");
const windSpeed = document.getElementById("windSpeed");

const ball = document.getElementById("ball");
const path = document.getElementById("path");

// --- GAME ---
const game = {
hole:1,
distances:[410,530,165,390,420,210,560,440,180,400,520,170,385,430,200,550,445,175],
remaining:0,
strokesHole:0,
total:0
};

// --- CLUB ---
function applyClub(speed, spin){
const club = clubSelect.value;
if(club==="driver") return {speed:speed*1.05, spin:spin*0.85};
if(club==="iron") return {speed:speed*0.95, spin:spin*1.05};
return {speed:speed*0.8, spin:spin*1.2};
}

// --- INIT ---
function startHole(){
game.remaining = game.distances[game.hole-1];
game.strokesHole = 0;
updateUI(`Distance to green: ${game.remaining.toFixed(0)} yd`);
moveBall(0);
}

// --- UI ---
function updateUI(text=""){
holeNum.textContent = game.hole;
holeDist.textContent = game.distances[game.hole-1];
remain.textContent = Math.max(0,game.remaining).toFixed(0);
strokesHole.textContent = game.strokesHole;
totalScore.textContent = game.total;
feedback.textContent = text;
}

// --- PHYSICS ---
function simulate(speed, launch, spin, wind){
const windMs=wind*0.447;
const g=9.81;
let vx=speed*Math.cos(launch*Math.PI/180);
let vy=speed*Math.sin(launch*Math.PI/180);
let x=0,y=0;
const pts=[];

for(let i=0;i<500;i++){
pts.push({x,y});
vx -= 0.01*(vx-windMs);
vy -= 0.01*vy + g*0.02;
x += vx;
y += vy;
if(y<0) break;
}

return {dist:x*0.1, pts};
}

// --- EASING FUNCTION ---
function easeOut(t){
return 1 - Math.pow(1 - t, 3);
}

// --- SMOOTH ANIMATION ---
function animate(pts){

const maxX = pts[pts.length-1].x || 1;
const maxY = Math.max(...pts.map(p=>p.y),1);

const scaled = pts.map(p => ({
x: 10 + (p.x/maxX)*350,
y: 140 - (p.y/maxY)*100
}));

// draw path
const d = scaled.map((p,i)=>`${i?"L":"M"}${p.x},${p.y}`).join(" ");
path.setAttribute("d", d);
path.setAttribute("opacity","1");

const duration = 1200;
const start = performance.now();

function frame(now){
let t = (now - start) / duration;
if(t > 1) t = 1;

const eased = easeOut(t);
const index = Math.floor(eased * (scaled.length - 1));
const p = scaled[index];

ball.setAttribute("cx", p.x);
ball.setAttribute("cy", p.y);

if(t < 1){
requestAnimationFrame(frame);
}
}

requestAnimationFrame(frame);
}

// --- MAIN ---
function launchShot(){

let speed = +clubSpeed.value;
let spin = +spinRate.value;
const mod = applyClub(speed,spin);
speed = mod.speed;
spin = mod.spin;

const launch = +launchAngle.value;
const wind = +windSpeed.value;

const sim = simulate(speed,launch,spin,wind);
const shot = sim.dist;

game.strokesHole++;
game.total++;

animate(sim.pts);

setTimeout(()=>{

const prev = game.remaining;

if(shot > prev){
const over = shot-prev;
game.total++;
game.strokesHole++;
game.remaining = 0;
updateUI(`Long by ${over.toFixed(0)} yd`);
}
else{
game.remaining -= shot;
updateUI(`Distance to green: ${game.remaining.toFixed(0)} yd`);
}

if(game.remaining<=0){
setTimeout(nextHole,1000);
}

},1200);
}

// --- NEXT ---
function nextHole(){
if(game.hole>=18){
alert("Round Complete! Score: "+game.total);
return;
}
game.hole++;
startHole();
}

// --- RESET ---
function resetGame(){
game.hole=1;
game.total=0;
startHole();
}

// --- SLIDERS ---
clubSpeed.oninput=()=>clubSpeedVal.textContent=clubSpeed.value;
launchAngle.oninput=()=>launchVal.textContent=launchAngle.value;
spinRate.oninput=()=>spinVal.textContent=spinRate.value;
windSpeed.oninput=()=>windVal.textContent=windSpeed.value;

// start
startHole();

</script>

</body>
</html>
