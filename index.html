<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="apple-touch-icon" href="Jafur-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMM Golf - Live Lab ver2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap');

  :root {
    --forest: #1b4332;
    --grass: #2d6a4f;
    --parchment: #fdf5e6;
    --brass: #d4af37;
    --wood: #3d2b1f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('bcc.png');
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-position: center center;
    color: var(--parchment);
    min-height: 100vh;
    padding: 16px;
    max-width: 520px;
    margin: 0 auto;
  }

  h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--brass); text-align: center; margin-bottom: 2px; }
  .subtitle { text-align: center; font-size: 0.7rem; color: var(--brass); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 16px; }

  /* New HUD Design */
  .lab-hud {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
    position: relative; z-index: 10;
  }
  .hud-stat { background: rgba(0, 0, 0, 0.6); border: 1px solid var(--brass); border-radius: 4px; padding: 10px 4px; text-align: center; }
  .hud-label { font-size: 0.5rem; color: var(--brass); text-transform: uppercase; margin-bottom: 4px; }
  .hud-val { font-size: 1.2rem; font-weight: 600; color: #fff; }

  #course { width: 100%; border-radius: 8px; border: 2px solid var(--brass); margin-bottom: 14px; background: #0a1f16; position: relative; z-index: 10; }

  .controls {
    background: var(--wood);
    background-image: linear-gradient(to bottom, #4d3626, #2b1e15);
    border: 1px solid var(--brass);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 14px;
    position: relative; z-index: 10;
  }

  .club-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .club-btn { padding: 6px 4px; background: #1b1b1b; border: 1px solid var(--brass); border-radius: 4px; color: var(--brass); font-size: 0.6rem; font-weight: 600; cursor: pointer; flex: 1 0 20%; min-width: 65px; text-align: center; }
  .club-btn.active { background: var(--brass); color: var(--wood); }

  .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .slider-label { font-size: 0.65rem; font-weight: 600; width: 85px; text-transform: uppercase; color: var(--parchment); }
  .slider-val { font-size: 0.8rem; color: var(--brass); width: 45px; text-align: right; font-weight: bold; }

  input[type=range] { flex: 1; -webkit-appearance: none; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: var(--brass); border-radius: 50%; border: 2px solid var(--wood); cursor: pointer; }

  .btn-row { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; cursor: pointer; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
  .btn-compare { background: var(--grass); color: white; }
  .btn-reset { background: #4a1e1e; color: white; }
</style>
</head>
<body>

<div style="position: relative; z-index: 10;">
  <h2>⛳ JMM Club Lab ver2</h2>
  <div class="subtitle">Golf Physics • Live Lab ver 2</div>

  <div class="lab-hud">
    <div class="hud-stat"><div class="hud-label">Carry</div><div class="hud-val" id="valCarry">0</div></div>
    <div class="hud-stat"><div class="hud-label">Total</div><div class="hud-val" id="valTotal">0</div></div>
    <div class="hud-stat"><div class="hud-label">Apex</div><div class="hud-val" id="valApex">0</div></div>
  </div>

  <svg id="course" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="200" fill="#0a1f16"/>
    <rect x="0" y="185" width="400" height="15" fill="#1b4332"/>
    <ellipse cx="360" cy="185" rx="30" ry="8" fill="#2d6a4f" stroke="var(--brass)" stroke-width="0.5" opacity="0.3"/>
    
    <g id="ghostLayer"></g>
    <path id="livePath" stroke="var(--brass)" fill="none" stroke-width="2.5" stroke-dasharray="1,1" />
    <circle id="ball" cx="11" cy="185" r="4" fill="white"/>
  </svg>

  <div class="controls">
    <div class="club-row" id="clubButtons"></div>
    
    <div class="slider-row">
      <span class="slider-label">Club Speed</span>
      <input type="range" id="clubSpeed" min="40" max="130" value="100">
      <span class="slider-val" id="clubSpeedVal">100</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Launch Angle</span>
      <input type="range" id="launchAngle" min="5" max="45" value="12">
      <span class="slider-val" id="launchVal">12°</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Backspin</span>
      <input type="range" id="spinRate" min="1500" max="8000" value="2500">
      <span class="slider-val" id="spinVal">2500</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Wind</span>
      <input type="range" id="windSpeed" min="-40" max="40" value="0">
      <span class="slider-val" id="windVal">0</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-compare" onclick="freezeArc()">Freeze Current Arc</button>
    <button class="btn btn-reset" onclick="resetLab()">Clear All</button>
  </div>
</div>

<script>
const clubs = [
  {name: "DRIVER", id: "dr", speedMult: 1.00, smash: 1.48, spinMult: 0.8},
  {name: "FANTASY", id: "fdr", speedMult: 1.02, smash: 1.51, spinMult: 0.7},
  {name: "3-WOOD", id: "3w", speedMult: 0.93, smash: 1.45, spinMult: 0.9},
  {name: "5-IRON", id: "5i", speedMult: 0.80, smash: 1.38, spinMult: 1.2},
  {name: "7-IRON", id: "7i", speedMult: 0.72, smash: 1.33, spinMult: 1.4},
  {name: "9-IRON", id: "9i", speedMult: 0.65, smash: 1.28, spinMult: 1.7},
  {name: "SW",     id: "sw", speedMult: 0.55, smash: 1.15, spinMult: 2.2}
];

let selectedClub = clubs[0];
let currentPathData = "";

function updatePhysics() {
  const clubSpeed = parseFloat(document.getElementById('clubSpeed').value);
  const launchDeg = parseFloat(document.getElementById('launchAngle').value);
  const spinRpm = parseFloat(document.getElementById('spinRate').value);
  const windMph = parseFloat(document.getElementById('windSpeed').value);

  const windMs = windMph * 0.447;
  const g = 9.81;
  const rho = 1.2;
  const ballMass = 0.046;
  const ballRadius = 0.021;
  
  // Real-time calculation
  const v0 = (clubSpeed * selectedClub.speedMult) * 0.447 * selectedClub.smash;        
  const theta = launchDeg * Math.PI / 180;

  const pts = [];
  let vx = v0 * Math.cos(theta);
  let vy = v0 * Math.sin(theta);
  let x = 0, y = 0;
  let maxH = 0;
  const dt = 0.015;

  for (let i = 0; i < 2000; i++) {
    pts.push({ x: x, y: y });
    if (y > maxH) maxH = y;

    const spd = Math.sqrt(vx * vx + vy * vy);
    const relVx = vx - windMs;
    const relSpd = Math.sqrt(relVx * relVx + vy * vy);
    
    const Fd = 0.5 * rho * relSpd * relSpd * (Math.PI * ballRadius * ballRadius) * 0.3;
    const omega = (spinRpm * selectedClub.spinMult) * 2 * Math.PI / 60;
    const Fl = 0.000012 * omega * relSpd;
    
    const ax = -(Fd / ballMass) * (relVx / relSpd);
    const ay = -(Fd / ballMass) * (vy / relSpd) - g + (Fl / ballMass);
    
    vx += ax * dt;
    vy += ay * dt;
    x += vx * dt;
    y += vy * dt;
    if (y < 0) break;
  }

  const carryYd = x * 1.094;
  const totalYd = carryYd * 1.12; // Standard rollout
  
  drawPath(pts, carryYd, totalYd, maxH);
}

function drawPath(pts, carry, total, apex) {
  // Scaling for 400x200 SVG
  const scaleX = 1.1; 
  const scaleY = 2.8;
  const startX = 11;
  const startY = 185;

  const d = pts.map((p, i) => {
    const sx = startX + (p.x * scaleX);
    const sy = startY - (p.y * scaleY);
    return `${i === 0 ? 'M' : 'L'}${sx},${sy}`;
  }).join(' ');

  currentPathData = d;
  document.getElementById('livePath').setAttribute('d', d);
  
  // Update HUD
  document.getElementById('valCarry').textContent = Math.round(carry);
  document.getElementById('valTotal').textContent = Math.round(total);
  document.getElementById('valApex').textContent = Math.round(apex * 1.094);
}

function freezeArc() {
  const gLayer = document.getElementById('ghostLayer');
  const ghost = document.createElementNS("http://www.w3.org/2000/svg", "path");
  ghost.setAttribute('d', currentPathData);
  ghost.setAttribute('stroke', 'rgba(253, 245, 230, 0.3)');
  ghost.setAttribute('fill', 'none');
  ghost.setAttribute('stroke-width', '1');
  gLayer.appendChild(ghost);
}

function resetLab() {
  document.getElementById('ghostLayer').innerHTML = '';
}

function createClubButtons() {
  const container = document.getElementById('clubButtons');
  clubs.forEach(c => {
    const b = document.createElement('button');
    b.className = 'club-btn' + (c.id === selectedClub.id ? ' active' : '');
    b.textContent = c.name;
    b.onclick = () => {
      document.querySelectorAll('.club-btn').forEach(btn => btn.classList.remove('active'));
      b.classList.add('active'); 
      selectedClub = c;
      updatePhysics();
    };
    container.appendChild(b);
  });
}

// Event Listeners for Live Updates
document.getElementById('clubSpeed').oninput = e => {
  document.getElementById('clubSpeedVal').textContent = e.target.value;
  updatePhysics();
};
document.getElementById('launchAngle').oninput = e => {
  document.getElementById('launchVal').textContent = e.target.value + "°";
  updatePhysics();
};
document.getElementById('spinRate').oninput = e => {
  document.getElementById('spinVal').textContent = e.target.value;
  updatePhysics();
};
document.getElementById('windSpeed').oninput = e => {
  document.getElementById('windVal').textContent = e.target.value;
  updatePhysics();
};

createClubButtons();
updatePhysics(); // Initial Draw
</script>
</body>
</html>
