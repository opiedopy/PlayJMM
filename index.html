<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="apple-touch-icon" href="JMM-Lab.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMMLab22 - Ball & Aero</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap');

  :root {
    --forest: #1b4332;
    --grass: #2d6a4f;
    --parchment: #fdf5e6;
    --brass: #d4af37;
    --wood: #3d2b1f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('bcc.png');
    background-color: var(--forest);
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-position: center center;
    color: var(--parchment);
    min-height: 100vh;
    padding: 16px;
    max-width: 520px;
    margin: 0 auto;
  }

  h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--brass); text-align: center; margin-bottom: 2px; }
  .subtitle { text-align: center; font-size: 0.7rem; color: var(--brass); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 16px; }

  .lab-hud {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 14px;
    position: relative; z-index: 10;
  }
  .hud-stat { background: rgba(0, 0, 0, 0.6); border: 1px solid var(--brass); border-radius: 4px; padding: 10px 1px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
  .hud-label { font-size: 0.5rem; color: var(--brass); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .hud-val { font-size: 1.1rem; font-weight: 600; color: #fff; }
  .hud-unit { font-size: 0.55rem; color: #aaa; margin-left: 1px; font-weight: 400;}

  #course { width: 100%; border-radius: 8px; border: 2px solid var(--brass); margin-bottom: 14px; background: #0a1f16; position: relative; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }

  .controls {
    background: var(--wood);
    background-image: linear-gradient(to bottom, #4d3626, #2b1e15);
    border: 1px solid var(--brass);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 14px;
    position: relative; z-index: 10;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }

  .club-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
  .club-btn { padding: 6px 2px; background: #1b1b1b; border: 1px solid var(--brass); border-radius: 4px; color: var(--brass); font-size: 0.5rem; font-weight: 600; letter-spacing: 0px; cursor: pointer; flex: 1 0 18%; min-width: 50px; text-align: center; transition: all 0.2s; }
  .club-btn.active { background: var(--brass); color: var(--wood); box-shadow: 0 0 8px var(--brass); }

  .slider-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 12px;
  }

  .slider-box {
    background: rgba(0, 0, 0, 0.25);
    padding: 6px 8px;
    border-radius: 4px;
    border: 1px solid rgba(212, 175, 55, 0.15);
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.55rem;
    font-weight: 600;
    color: var(--parchment);
    text-transform: uppercase;
    margin-bottom: 4px;
    align-items: center;
  }
  .slider-val { color: var(--brass); font-weight: bold; text-align: right; }

  input[type=range] { 
    width: 100%; 
    -webkit-appearance: none; 
    height: 12px; 
    background: rgba(255,255,255,0.1); 
    border-radius: 6px; 
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb { 
    -webkit-appearance: none; 
    width: 28px;  
    height: 28px; 
    background: var(--brass); 
    border-radius: 50%; 
    border: 2px solid var(--wood); 
    cursor: pointer; 
    margin-top: -8px; 
    box-shadow: 0 0 8px rgba(0,0,0,0.5);
  }

  .btn-row { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; cursor: pointer; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; transition: transform 0.1s; }
  .btn-compare { background: var(--grass); color: white; border: 1px solid #4ade80; }
  .btn-reset { background: #4a1e1e; color: white; border: 1px solid #f87171; }
</style>
</head>
<body>

<div style="position: relative; z-index: 10;">
  <h2>⛳ JMM Club Lab 22</h2>
  <div class="subtitle">Aero Calibration • AVL Base (2,165')</div>

  <div class="lab-hud">
    <div class="hud-stat"><div class="hud-label">Carry</div><div class="hud-val"><span id="valCarry">0</span><span class="hud-unit">yd</span></div></div>
    <div class="hud-stat"><div class="hud-label">Total</div><div class="hud-val"><span id="valTotal">0</span><span class="hud-unit">yd</span></div></div>
    <div class="hud-stat"><div class="hud-label">Launch</div><div class="hud-val"><span id="valLaunch">0</span><span class="hud-unit">°</span></div></div>
    <div class="hud-stat"><div class="hud-label">Apex</div><div class="hud-val"><span id="valApex">0</span><span class="hud-unit">yd</span></div></div>
  </div>

  <svg id="course" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="200" fill="#0a1f16" opacity="0.8"/>
    <line x1="106" y1="185" x2="106" y2="190" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <text x="106" y="198" fill="#fff" font-size="8" text-anchor="middle" opacity="0.4">100</text>
    <line x1="201" y1="185" x2="201" y2="190" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <text x="201" y="198" fill="#fff" font-size="8" text-anchor="middle" opacity="0.4">200</text>
    <line x1="296" y1="185" x2="296" y2="190" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <text x="296" y="198" fill="#fff" font-size="8" text-anchor="middle" opacity="0.4">300</text>
    
    <rect x="0" y="185" width="400" height="15" fill="#1b4332"/>
    <ellipse cx="360" cy="185" rx="30" ry="8" fill="#2d6a4f" stroke="var(--brass)" stroke-width="0.5" opacity="0.3"/>
    
    <g id="ghostLayer"></g>
    <path id="livePath" stroke="var(--brass)" fill="none" stroke-width="2.5" stroke-dasharray="1,1" />
  </svg>

  <div class="controls">
    <div class="club-row" id="clubButtons"></div>
    
    <div class="slider-grid">
      <div class="slider-box">
        <div class="slider-label"><span>Club Spd</span> <span class="slider-val" id="clubSpeedVal">110</span></div>
        <input type="range" id="clubSpeed" min="40" max="140" value="110">
      </div>
      <div class="slider-box">
        <div class="slider-label"><span>Smash</span> <span class="slider-val" id="smashFactorVal">1.48</span></div>
        <input type="range" id="smashFactor" min="1.0" max="1.52" step="0.01" value="1.48">
      </div>
      <div class="slider-box">
        <div class="slider-label"><span>Static Loft</span> <span class="slider-val" id="staticLoftVal">10.5°</span></div>
        <input type="range" id="staticLoft" min="8" max="60" step="0.5" value="10.5">
      </div>
      <div class="slider-box">
        <div class="slider-label"><span>AoA</span> <span class="slider-val" id="aoaVal">2.0°</span></div>
        <input type="range" id="aoa" min="-10" max="8" step="0.1" value="2">
      </div>
      
      <div class="slider-box" style="grid-column: span 2;">
        <div class="slider-label"><span>Ball Model</span> <span class="slider-val" id="ballTypeVal">Premium Tour</span></div>
        <input type="range" id="ballType" min="0" max="4" step="1" value="0">
      </div>

      <div class="slider-box" style="grid-column: span 2;">
        <div class="slider-label"><span>Environment (Alt/Temp)</span> <span class="slider-val" id="envVal">Standard AVL</span></div>
        <input type="range" id="envLevel" min="-2000" max="5000" step="500" value="0">
      </div>

      <div class="slider-box">
        <div class="slider-label"><span>Backspin</span> <span class="slider-val" id="spinRateVal">2400</span></div>
        <input type="range" id="spinRate" min="500" max="12000" step="100" value="2400">
      </div>
      <div class="slider-box">
        <div class="slider-label"><span>Wind</span> <span class="slider-val" id="windSpeedVal">0</span></div>
        <input type="range" id="windSpeed" min="-40" max="40" value="0">
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-compare" onclick="freezeArc()">Freeze</button>
    <button class="btn btn-reset" onclick="resetLab()">Clear</button>
  </div>
</div>

<script>
const ASHEVILLE_ELEV = 2165;
const BALL_MASS_KG = 0.04593;

const ballModels = [
  { name: "Premium Tour", cd: 0.23, cl: 0.16 },
  { name: "Distance/Hard", cd: 0.21, cl: 0.13 },
  { name: "Soft/Spin", cd: 0.25, cl: 0.19 },
  { name: "Range Ball", cd: 0.28, cl: 0.14 },
  { name: "Beat Up/Scuffed", cd: 0.32, cl: 0.12 }
];

const clubs = [
  {name: "DR", loft: 10.5, speed: 110, smash: 1.48, spin: 2400, aoa: 2},
  {name: "3W", loft: 15.0, speed: 104, smash: 1.45, spin: 3200, aoa: 0},
  {name: "5I", loft: 25.0, speed: 91,  smash: 1.37, spin: 4800, aoa: -3},
  {name: "7I", loft: 32.0, speed: 85,  smash: 1.31, spin: 6500, aoa: -4},
  {name: "PW", loft: 44.0, speed: 73,  smash: 1.20, spin: 9500, aoa: -5}
];

let selectedClub = clubs[0];
let currentPathData = "";

function setupSliders() {
  const ids = ['clubSpeed', 'smashFactor', 'staticLoft', 'aoa', 'spinRate', 'windSpeed', 'ballType', 'envLevel'];
  ids.forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      updateLabels();
      updatePhysics();
    });
  });
}

function updateLabels() {
  document.getElementById('clubSpeedVal').textContent = document.getElementById('clubSpeed').value;
  document.getElementById('smashFactorVal').textContent = document.getElementById('smashFactor').value;
  document.getElementById('staticLoftVal').textContent = document.getElementById('staticLoft').value + "°";
  document.getElementById('aoaVal').textContent = document.getElementById('aoa').value + "°";
  document.getElementById('spinRateVal').textContent = document.getElementById('spinRate').value;
  document.getElementById('windSpeedVal').textContent = document.getElementById('windSpeed').value;
  
  const bIdx = document.getElementById('ballType').value;
  document.getElementById('ballTypeVal').textContent = ballModels[bIdx].name;

  const envOffset = parseInt(document.getElementById('envLevel').value);
  const totalEffAlt = ASHEVILLE_ELEV + envOffset;
  document.getElementById('envVal').textContent = envOffset === 0 ? "Standard AVL" : (totalEffAlt + " ft");
}

function updatePhysics() {
  const speedMph = parseFloat(document.getElementById('clubSpeed').value);
  const smash = parseFloat(document.getElementById('smashFactor').value);
  const loft = parseFloat(document.getElementById('staticLoft').value);
  const aoa = parseFloat(document.getElementById('aoa').value);
  const spin = parseFloat(document.getElementById('spinRate').value);
  const windMph = parseFloat(document.getElementById('windSpeed').value);
  
  const bIdx = document.getElementById('ballType').value;
  const Cd = ballModels[bIdx].cd;
  const Cl_base = ballModels[bIdx].cl;

  // Air Density Calculation based on effective altitude
  const effAlt = ASHEVILLE_ELEV + parseInt(document.getElementById('envLevel').value);
  const rho = 1.225 * Math.exp(-0.000118 * effAlt * 0.3048); // Simple ISA model

  const launchDeg = (loft * 0.85) + (aoa * 0.1);
  document.getElementById('valLaunch').textContent = launchDeg.toFixed(1);

  const g = 9.806;
  const area = 0.001432;
  const v0 = speedMph * 0.44704 * smash;
  const rad = launchDeg * Math.PI / 180;
  
  let vx = v0 * Math.cos(rad);
  let vy = v0 * Math.sin(rad);
  const v_wind = windMph * 0.44704;

  let x = 0, y = 0, apex = 0, carry = 0;
  const dt = 0.015;
  const pts = [];
  let landed = false;

  for (let i = 0; i < 2000; i++) {
    pts.push({x, y});
    if (y > apex) apex = y;

    let Vair_x = vx - v_wind;
    let Vair_y = vy;
    let Vair = Math.sqrt(Vair_x**2 + Vair_y**2);

    // Drag & Lift Forces
    let Fd = 0.5 * rho * Vair**2 * Cd * area;
    let Cl = Cl_base * (spin / 2500); // Normalized lift
    let Fl = 0.5 * rho * Vair**2 * Cl * area;

    let ax = (-Fd * (Vair_x / Vair) - Fl * (Vair_y / Vair)) / BALL_MASS_KG;
    let ay = (-g - Fd * (Vair_y / Vair) + Fl * (Vair_x / Vair)) / BALL_MASS_KG;

    vx += ax * dt;
    vy += ay * dt;
    x += vx * dt;
    y += vy * dt;

    if (y <= 0 && !landed) {
      carry = x * 1.09361;
      landed = true;
      break; 
    }
  }

  drawPath(pts, carry, apex * 1.09361);
}

function drawPath(pts, carry, apex) {
  const scaleX = 0.95;
  const scaleY = 2.0;
  const d = pts.map((p, i) => {
    const sx = 11 + (p.x * 1.09361 * scaleX);
    const sy = 185 - (p.y * 1.09361 * scaleY);
    return `${i === 0 ? 'M' : 'L'}${sx},${sy}`;
  }).join(' ');
  
  currentPathData = d;
  document.getElementById('livePath').setAttribute('d', d);
  document.getElementById('valCarry').textContent = Math.round(carry);
  document.getElementById('valTotal').textContent = Math.round(carry * 1.08); // Simulating average roll
  document.getElementById('valApex').textContent = Math.round(apex);
}

function createClubButtons() {
  const container = document.getElementById('clubButtons');
  clubs.forEach(c => {
    const b = document.createElement('button');
    b.className = 'club-btn';
    b.textContent = c.name;
    b.onclick = () => {
      document.querySelectorAll('.club-btn').forEach(btn => btn.classList.remove('active'));
      b.classList.add('active');
      document.getElementById('staticLoft').value = c.loft;
      document.getElementById('clubSpeed').value = c.speed;
      document.getElementById('smashFactor').value = c.smash;
      document.getElementById('spinRate').value = c.spin;
      document.getElementById('aoa').value = c.aoa;
      updateLabels();
      updatePhysics();
    };
    container.appendChild(b);
  });
  container.firstChild.click();
}

function freezeArc() {
  const gLayer = document.getElementById('ghostLayer');
  const ghost = document.createElementNS("http://www.w3.org/2000/svg", "path");
  ghost.setAttribute('d', currentPathData);
  ghost.setAttribute('stroke', 'rgba(212, 175, 55, 0.3)');
  ghost.setAttribute('fill', 'none');
  ghost.setAttribute('stroke-width', '1');
  gLayer.appendChild(ghost);
}

function resetLab() {
  document.getElementById('ghostLayer').innerHTML = '';
}

setupSliders();
createClubButtons();
</script>
</body>
</html>
